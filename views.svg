<svg xmlns="http://www.w3.org/2000/svg" width="250" height="60">
  <!-- background panel -->
  <rect x="0" y="0" width="250" height="60" rx="10"
        fill="#0a0f0a" stroke="#00ff66" stroke-width="2"/>
        
  <!-- subtle glow -->
  <rect x="0" y="0" width="250" height="60" rx="10"
        fill="none" stroke="#00ff66" stroke-opacity="0.4" stroke-width="6"/>

  <!-- embedded counter -->
  <foreignObject x="15" y="10" width="220" height="40">
    <div xmlns="http://www.w3.org/1999/xhtml" 
         style="
           width:100%;
           height:100%;
           color:#00ff66;
           font-family: 'Courier New', monospace;
           font-size:32px;
           font-weight:bold;
           display:flex;
           align-items:center;
           justify-content:center;
           background:#001900;
           border-radius:6px;
           border:2px solid #00ff66;
           box-shadow:0 0 10px #00ff66 inset;
         ">
      <img src="https://profile-counter.deno.dev/GitRosas/count.svg"
           style="height:30px; filter: drop-shadow(0 0 4px #00ff66);" />
    </div>
  </foreignObject>
</svg>
