<svg width="320" height="70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e75b6">
        <animate attributeName="stop-color"
          values="#0e75b6; #33aaff; #0e75b6"
          dur="4s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#033b58">
        <animate attributeName="stop-color"
          values="#033b58; #0e75b6; #033b58"
          dur="4s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="5" y="5" rx="12" width="310" height="60"
        fill="url(#grad)" stroke="#0e75b6" stroke-width="2"
        filter="url(#glow)">
    <animate attributeName="stroke-width"
      values="2;3;2" dur="3s" repeatCount="indefinite" />
  </rect>

  <text x="160" y="42" font-size="20" text-anchor="middle"
        fill="white" font-family="Arial">
    Profile Views: ????
    <animate attributeName="opacity"
      values="1;0.7;1" dur="2s" repeatCount="indefinite" />
  </text>
</svg>
